<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title-key="extensionName">Markdown Editor</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 data-i18n="markdownEditor">Markdown Editor</h1>
      <div class="toolbar">
        <button id="formatBtn" data-i18n-title="format">📝</button>
        <button id="copyHtmlBtn" data-i18n-title="copyHTML">📋</button>
        <button id="copyMarkdownBtn" data-i18n-title="copyMarkdown">📄</button>
        <button id="clearBtn" data-i18n-title="clear">🗑️</button>
      </div>
    </div>

    <div class="editor-container">
      <div class="editor-panel">
        <div class="panel-header">
          <span data-i18n="markdownEditor">Markdown Editor</span>
          <div class="editor-tools">
            <button id="boldBtn" data-i18n-title="bold">B</button>
            <button id="italicBtn" data-i18n-title="italic">I</button>
            <button id="linkBtn" data-i18n-title="link">🔗</button>
            <button id="codeBtn" data-i18n-title="code">{ }</button>
          </div>
        </div>
        <textarea id="markdownInput" data-i18n-placeholder="inputPlaceholder" placeholder="Enter your Markdown content here..."></textarea>
      </div>

      <div class="preview-panel">
        <div class="panel-header">
          <span data-i18n="livePreview">Live Preview</span>
          <div class="preview-tools">
            <button id="fullscreenBtn" data-i18n-title="fullscreen">⛶</button>
          </div>
        </div>
        <div id="markdownPreview" class="preview-content"></div>
      </div>
    </div>

    <div class="footer">
      <div class="stats">
        <span id="wordCount">0 <span data-i18n="wordCount">Words</span></span>
        <span id="charCount">0 <span data-i18n="charCount">Characters</span></span>
      </div>
    </div>
  </div>

  <script src="lib/marked.min.js"></script>
  <script src="lib/highlight.min.js"></script>
  <script src="scripts/i18n.js"></script>
  <script src="scripts/popup.js"></script>
</body>
</html>
